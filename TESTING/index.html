<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* your styles here */

/* contact form */
.contact-button-container {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 1000;
}

.round-button {
  background-color: #18b0ec;
  border: none;
  color: white;
  padding: 10px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
  transition: background-color 0.3s ease;
  margin-left: 100px;
  margin-bottom: -1px;
}

.round-button img {
  width: 42px;
  height: 39px;
}

.round-button:hover {
  background-color: #18b0ec;
  animation: button-hover-animation 0.28s ease-in-out forwards;
}

.round-button:active {
  /*background-color: orangered; !* Even darker orange color on active *!*/
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
}

@keyframes button-hover-animation {
  0% {
    transform: scale(1);
  }
  /*50% { transform: scale(1.1); }*/
  100% {
    transform: scale(1.1);
  }
}
.contact-button-container {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 1000;
}

.round-button {
  background-color: #18b0ec;
  border: none;
  color: white;
  padding: 10px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
  transition: background-color 0.3s ease;
  margin-left: 100px;
  margin-bottom: -1px;
}

.round-button img {
  width: 42px;
  height: 39px;
}

.round-button:hover {
  background-color: #18b0ec;
}

.round-button:active {
  background-color: #18b0ec;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
}

.wrapper {
  /* display: none; */
  position: fixed;
  bottom: 80px;
  left: 20px;
  z-index: 1001;
  width: 100%;
  max-width: 480px;
}

.form1 {
  background: #fff;
  box-shadow: 0 30px 60px 0 rgba(90, 116, 148, 0.4);
  border-radius: 5px;
  padding: 20px;
  padding-right: 20px;
  border-top: 5px solid #18b0ec;
  animation: bounce 1.5s infinite;
  margin-bottom: 18px;
}

.form1 .pageTitle {
  font-size: 2em;
  font-weight: bold;
  text-align: center;
  margin-bottom: 20px;
}

.form1 .formEntry {
  display: block;
  width: 100%;
  padding: 10px;
  margin-bottom: 20px;
  border: none;
  border-radius: 2px;
  background-color: #ebebeb;
  transition: all 0.5s ease;
}

.form1 .formEntry:hover {
  border-bottom: 5px solid #18b0ec;
  transition: all 0.5s ease;
}

.form1 .submit {
  width: 100%;
  color: white;
  background-color: #18b0ec;
  font-size: 20px;
  border: none;
  padding: 10px;
  cursor: pointer;
  transition: all 0.5s ease;
}

.form1 .submit:hover {
  box-shadow: 15px 15px 15px 5px rgba(78, 72, 77, 0.219);
  transform: translateY(-3px);
}

@keyframes bounce {
  0% {
    transform: translate(0, 4px);
  }
  50% {
    transform: translate(0, 8px);
  }
}

    .round-button.open {
      background-image: url('https://img.icons8.com/pulsar-line/48/down-arrow.png');
      background-size: 24px 24px;
      background-position: center;
    }
  </style>
</head>
<body>
  <div class="contact-button-container">
    <button class="round-button" id="contact-button">
      <img
        width="24"
        height="24"
        src="https://img.icons8.com/pulsar-line/48/about-me-male.png"
        alt="about-me-male"
      />
    </button>
    <div class="wrapper" id="contact-form" style="display: none;">
      <form class="form1" onsubmit="thanks(); reset(); return false;">
        <div class="pageTitle title">Contact.</div>
        <input type="text" class="name formEntry" placeholder="Name" />
        <input
          type="text"
          class="email formEntry"
          placeholder="Email"
        />
        <textarea
          class="message formEntry"
          placeholder="Message"
        ></textarea>
        <button class="submit formEntry">Submit</button>
      </form>
    </div>
  </div>

  <script>
    const contactButton = document.getElementById('contact-button');
    const contactForm = document.getElementById('contact-form');

    contactButton.addEventListener('click', (e) => {
      e.stopPropagation();
      contactForm.style.display = contactForm.style.display === 'block' ? 'none' : 'block';
      contactButton.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (e.target !== contactButton && !contactForm.contains(e.target)) {
        contactForm.style.display = 'none';
        contactButton.classList.remove('open');
      }
    });

    contactForm.addEventListener('click', (e) => {
      e.stopPropagation();
    });

    function thanks() {
      alert('Thank you for your message!');
    }

    function reset() {
      document.querySelector('.form1').reset();
    }
  </script>
</body>
</html>
